# Per-round manifest. Each round has a checkpoint and a set of evals we want
# to run against it. gpufarm/gaps.py compares each round's eval_bundle to the
# JSONs currently on spark / local docs/ and prints the gaps.
#
# eval_bundle entries are job IDs from gpufarm/jobs.yaml. The defaults set
# below covers the "standard" eval pack; rounds with extra ablations can add
# overrides.

eval_defaults: &eval_defaults
  - inference_benchmark
  - per_token_halt
  - depth_extrap_k64
  - reasoning_eval
  - act_halt_diagnostic
  - act_halt_histogram
  - gen_samples_multidepth
  - sft_lora

rounds:
  r23:
    description: "Round 2.3 (extended joint, see #50)"
    ckpt_dir: checkpoints_3b_varT_pondernet_round23
    ckpt_step: 3051
    bootstrap: r22
    eval_bundle: *eval_defaults

  r24:
    description: "Round 2.4: PonderNet joint from r2 collapsed (#44)"
    ckpt_dir: checkpoints_3b_varT_pondernet_round24
    ckpt_step: 3051
    bootstrap: r2_collapsed
    eval_bundle: *eval_defaults

  r25:
    description: "Round 2.5: fixed T=8 from r2 collapsed (#47)"
    ckpt_dir: checkpoints_3b_varT_act_v3_round25_fixedT8
    ckpt_step: 3051
    bootstrap: r2_collapsed
    T_FIXED: 8
    eval_bundle: *eval_defaults

  r26:
    description: "Round 2.6: continue r2.3 joint +50M (#50)"
    ckpt_dir: checkpoints_3b_varT_pondernet_round26
    ckpt_step: 3051
    bootstrap: r23
    eval_bundle: *eval_defaults

  r27:
    description: "Round 2.7: PonderNet-KL lambda_p=0.1 from r2 collapsed (#51)"
    ckpt_dir: checkpoints_3b_varT_pondernet_round27_lp01
    ckpt_step: 3051
    bootstrap: r2_collapsed
    eval_bundle: *eval_defaults

  r28:
    description: "Round 2.8: anti-collapse head fine-tune from r2.4 backbone (#52)"
    ckpt_dir: checkpoints_3b_anticollapse_round28
    ckpt_step: 3051
    bootstrap: r24
    eval_bundle: *eval_defaults
    # NOTE: ckpt has been cleaned up; gaps will show but cannot fill without
    # retraining. Mark "ckpt_gone" in the manifest once that's confirmed.
    ckpt_status: cleaned_up

  r29:
    description: "Round 2.9: no-recurrence baseline T_FIXED=1 from r2 collapsed (#54)"
    ckpt_dir: checkpoints_3b_varT_act_v3_round29_T1
    ckpt_step: 3051
    bootstrap: r2_collapsed
    T_FIXED: 1
    eval_bundle: *eval_defaults

  r210:
    description: "Round 2.10: continue r2.6 joint PonderNet-KL +50M (#56)"
    ckpt_dir: checkpoints_3b_varT_pondernet_round210
    ckpt_step: 3051
    bootstrap: r26
    eval_bundle: *eval_defaults

  r211:
    description: "Round 2.11: fixed-T=2 from r2 collapsed -- compute-scaling baseline (#57)"
    ckpt_dir: checkpoints_3b_varT_act_v3_round211_T2
    ckpt_step: 12207
    bootstrap: r2_collapsed
    T_FIXED: 2
    eval_bundle:
      # Compute-scaling baselines skip SFT (not a candidate for paper SFT table)
      - inference_benchmark
      - per_token_halt
      - depth_extrap_k64
      - reasoning_eval
      - act_halt_diagnostic
      - act_halt_histogram
      - gen_samples_multidepth

  r212:
    description: "Round 2.12: fixed-T=4 from r2 collapsed -- compute-scaling baseline (#58)"
    ckpt_dir: checkpoints_3b_varT_act_v3_round212_T4
    ckpt_step: 12207
    bootstrap: r2_collapsed
    T_FIXED: 4
    eval_bundle:
      - inference_benchmark
      - per_token_halt
      - depth_extrap_k64
      - reasoning_eval
      - act_halt_diagnostic
      - act_halt_histogram
      - gen_samples_multidepth

  r213:
    description: "Round 2.13: extend r2.10 joint to 200M tokens (#61)"
    ckpt_dir: checkpoints_3b_varT_pondernet_round213
    ckpt_step: 3051
    bootstrap: r210
    eval_bundle: *eval_defaults

  r214:
    description: "Round 2.14: T_FIXED=16 compute-scaling extension (#62)"
    ckpt_dir: checkpoints_3b_varT_act_v3_round214_T16
    ckpt_step: 3051
    bootstrap: r2_collapsed
    T_FIXED: 16
    T_MAX: 16  # extends LoRA scale via padding in bootstrap_model_weights
    eval_bundle:
      # Same as r211/r212 (compute-scaling row); no SFT
      - inference_benchmark
      - per_token_halt
      - depth_extrap_k64
      - reasoning_eval
      - act_halt_diagnostic
      - act_halt_histogram
      - gen_samples_multidepth

  r215:
    description: "Round 2.15: scaled joint PonderNet-KL +300M tokens on r2.13 backbone (#63)"
    # 6x the per-round budget the r2.3 -> r2.6 -> r2.10 -> r2.13 chain used.
    # Bootstrap is the consolidated r2.13 full ckpt (200M cumulative tokens
    # of joint training; 100M of bypass before that). Total recipe depth
    # after this round: ~500M tokens of joint training on top of 100M of
    # bypass training. Tests whether the depth-extrap CE plateau observed
    # at the 200M point (r2.13) lifts with another 300M tokens under the
    # same recipe.
    #
    # ckpt_step note: original placeholder was 18306 (6x r2.13's 3051,
    # linear extrapolation pre-training). Actual final consolidated step
    # is 18310 -- the consolidated full.pt that produced the paper's r2.15
    # results lives on kebab-rtx6000 at
    # checkpoints_3b_varT_pondernet_round215/step_0018310_full.pt
    # (May 26). Cluster training did continue past that point to step
    # 18800 (rank shards still on kebab-spark, 4 ranks present) but those
    # later shards were never consolidated and are not the source of any
    # published number. Treat 18310 as the canonical r215 endpoint.
    ckpt_dir: checkpoints_3b_varT_pondernet_round215
    ckpt_step: 18310
    bootstrap: r213
    eval_bundle: *eval_defaults

  r218:
    description: "Round 2.18: lambda_p=1.0 cluster ablation -- discriminating test for the depth-3 floor (task #105)"
    # Lambda_p=1.0 means the halt-prior KL term is maximally weighted, pushing
    # the model toward the geometric-1 (always halt at depth 1) prior. The
    # interesting question is whether the model collapses to depth 1 or
    # stays at depth 3 (where r2.13 plateaued), which would imply the depth
    # floor is a property of the data, not the halt prior.
    ckpt_dir: checkpoints_3b_varT_pondernet_round218
    ckpt_step: 24414
    bootstrap: r213
    eval_bundle: *eval_defaults

  r220:
    description: "Round 2.20: matched-compute non-ACT baseline (task #112)"
    # Same training token count as r2.18 (24414 steps) but with ACT disabled.
    # The model has no halt logic; each forward pass uses a fixed depth set
    # at training time. Provides the matched-compute control point that the
    # depth-extrap and reasoning_eval comparisons need to attribute gains to
    # the recurrent-depth ACT mechanism vs more compute alone.
    ckpt_dir: checkpoints_3b_varT_pondernet_round220
    ckpt_step: 24414
    bootstrap: r213
    # Non-ACT model -- the ACT-specific evals (per_token_halt, act_halt_*)
    # do not apply because there is no halt distribution to measure. We
    # run the architecture-agnostic evals only.
    eval_bundle:
      - inference_benchmark
      - depth_extrap_k64
      - reasoning_eval
      - gen_samples_multidepth

  r221:
    description: "Round 2.21: training-distribution floor discriminator (T_MIN=1,T_MAX=4 ablation on r2.18, task #155)"
    # Same architecture and same lambda_p as r2.18, but T_MIN=1, T_MAX=4
    # instead of T_MIN=2, T_MAX=12. The change exposes the model to
    # iteration-1 representations during training. If the halt step drops
    # to 1, the floor is a training-distribution artifact; if it stays at
    # 2, the floor is architectural. See
    # docs/experiments/r221_architectural_floor_plan.md for the predictions.
    ckpt_dir: checkpoints_3b_varT_pondernet_round221
    ckpt_step: 24414
    bootstrap: r218
    eval_bundle: *eval_defaults
