# GPU farm resource manifest. Source of truth for what hardware we have and
# what each unit is suitable for. Consumed by gpufarm/gaps.py (Layer 1) and
# the eventual dispatcher (Layer 2).

resources:
  # 4-node Spark cluster -- FSDP training over RoCE v2 on the 200 Gbps storage
  # network. These ranks are addressed together (4-rank torchrun) for any
  # cluster_4node job; never individually.
  - id: cluster-4node
    ssh_user: alexm
    members:
      - {rank: 0, host: kebab-spark-200g, jump_host: kebab-spark.lan, gid: 3}
      - {rank: 1, host: kebab-gx10-200g, jump_host: kebab-spark.lan, gid: 3}
      - {rank: 2, host: kebab-gx10-2-200g, jump_host: kebab-spark.lan, gid: 3}
      - {rank: 3, host: kebab-gx10-3-200g, jump_host: kebab-spark.lan, gid: 3}
    class: gb10
    vram_gb: 128                    # GB10 unified memory per node
    priority_tier: 0                # most precious (training only)
    can_run: [train_round, train_round_joint, consolidate, eval_4node]
    recovery_hook: |
      # Cluster doesn't have automatic recovery; on NCCL hang the retry_cluster
      # supervisor handles SIGKILL + relaunch (see retry_cluster_training.sh).
      ssh -q alexm@{master} "bash /home/alexm/OpenMythos/training/retry_cluster_training.sh"
    master_addr: 192.168.100.10
    nccl_env:
      NCCL_DEBUG: WARN
      NCCL_IB_HCA: rocep1s0f1
      NCCL_SOCKET_IFNAME: bond0
      GLOO_SOCKET_IFNAME: bond0
      TORCH_NCCL_HEARTBEAT_TIMEOUT_SEC: "420"
      OMP_NUM_THREADS: "2"
      MKL_NUM_THREADS: "2"
    notes: |
      CUDA capability 12.1 (warning: above pytorch's supported max 12.0,
      works in practice). Use [p]ython3 regex trick for any pgrep/pkill
      to avoid matching own shell command line.

  # Whole-host kebab-rtx6000 view -- exists for jobs that need BOTH GPUs
  # visible simultaneously (single-host multi-rank torchrun, e.g.
  # ``consolidate_single_host``). Without this, a job pinned to
  # ``blackwell-gpu0`` or ``blackwell-gpu1`` would either (a) get
  # ``CUDA_VISIBLE_DEVICES=N`` injected and only see 1 GPU -> all
  # torchrun ranks pile onto cuda:0 -> OOM, or (b) only stop conflicts_with
  # services on its own card and the OTHER card's vision/vllm services
  # keep eating VRAM. (Copilot OpenMythos PR#2 review.)
  #
  # cuda_device is intentionally null: ``render_command`` skips CVD
  # injection when ``resource.cuda_device is None``, so all GPUs on the
  # host stay visible.
  #
  # conflicts_with is the UNION of blackwell-gpu0 and blackwell-gpu1
  # entries -- jobs that take this resource need the whole host empty
  # of out-of-band services (vllm-language on gpu0; vision-cuda on gpu1;
  # embedding wherever). ``requires_exclusive: true`` on the job is the
  # trigger that actually evicts them.
  #
  # Scheduler note: this resource overlaps blackwell-gpu0 and
  # blackwell-gpu1 on hardware -- the lease store currently has no
  # resource-mutex feature, so it is the OPERATOR's responsibility
  # to verify the host is free before submitting a job pinned here.
  # In practice ``consolidate_single_host`` only runs once per round,
  # after the cluster training step finishes, so there is no concurrent
  # demand for blackwell-gpu0/1.
  - id: blackwell-host
    host: kebab-rtx6000.lan
    ssh_user: alexm
    cuda_device: null               # no CVD pin -- both GPUs visible to the job
    class: blackwell
    vram_gb: 192                    # 96 + 96 = whole host
    priority_tier: 1                # same tier as the per-GPU views
    can_run:
      - consolidate_single_host
    python_bin: /home/alexm/venvs/vllm-turboquant/bin/python3
    # Verified 2026-06-03: actual UNION of per-GPU services on kebab-rtx6000.
    # GPU 0 hosts vllm (gpt-oss-120b). GPU 1 hosts vllm-coder-gpu1
    # (Qwen3-Coder-Next-FP8) and embedding (Qwen3-Embedding-8B).
    conflicts_with:
      - {service: kebab-rtx-vllm.service, scope: system}              # gpu0
      - {service: kebab-rtx-vllm-coder-gpu1.service, scope: system}   # gpu1
      - {service: kebab-rtx-embedding.service, scope: system}         # gpu1
    router:
      url: http://kebab-rtx6000.lan:8080
      capabilities: [health, admin_models_load, admin_models_unload, admin_models_status]
    notes: |
      Whole-host view of kebab-rtx6000. Overlaps blackwell-gpu0 and
      blackwell-gpu1 -- operator must ensure no concurrent jobs on
      those before submitting. Only ``consolidate_single_host`` should
      ``requires_resource: blackwell-host`` today.

  - id: blackwell-gpu0
    host: kebab-rtx6000.lan
    ssh_user: alexm
    cuda_device: 0
    class: blackwell
    vram_gb: 96
    priority_tier: 1                # high-value, SFT + heavy evals
    can_run:
      - sft_lora
      - inference_benchmark
      - per_token_halt
      - depth_extrap
      - depth_extrap_k64
      - reasoning_eval
      - act_halt_diagnostic
      - act_halt_histogram
      - gen_samples_multidepth
      - eval_listops
      - eval_gsm8k
    python_bin: /home/alexm/venvs/vllm-turboquant/bin/python3
    # Verified 2026-06-03 against actual running units. The previous list
    # claimed embedding lived on GPU 0; in reality kebab-rtx-embedding
    # runs on GPU 1 alongside coder-next (the embedding service is small,
    # ~10 GB, and shares GPU 1 with the dominant coder model). The only
    # GPU-0-resident production service is kebab-rtx-vllm (gpt-oss-120b
    # via docker run --gpus device=0, holds ~85 GB at steady state).
    conflicts_with:
      - {service: kebab-rtx-vllm.service, scope: system}
    external_lease:
      service: kebab-rtx-vllm
      description: "gpt-oss-120b vLLM (system-scope, docker --gpus device=0, ~85 GB held)"
      held_vram_gb: 85
      state: held
      scope: system
    # kebab-rtx6000 FastAPI router (sibling_repos_survey.md:412-481).
    # admin_models_* applies to TTS backends only (orpheus/qwen3-tts/
    # omnivoice/csm); vLLM language + vision are out-of-band systemd units
    # so the scheduler must still SSH for those.  HEALTH wiring is the
    # only capability the gpufarm coordinator actually consumes today
    # (PR-D); admin_models_* is forward-compat for the v0.3 inference-
    # reservation work.
    router:
      url: http://kebab-rtx6000.lan:8080
      capabilities: [health, admin_models_load, admin_models_unload, admin_models_status]  # survey:472-481
    notes: "Has Vault access + GitHub creds -- DO NOT expose to vast.ai/external"

  - id: blackwell-gpu1
    host: kebab-rtx6000.lan
    ssh_user: alexm
    cuda_device: 1
    class: blackwell
    vram_gb: 96
    priority_tier: 1                # high-value, SFT + heavy evals
    can_run:
      - sft_lora
      - inference_benchmark
      - per_token_halt
      - depth_extrap
      - depth_extrap_k64
      - reasoning_eval
      - act_halt_diagnostic
      - act_halt_histogram
      - gen_samples_multidepth
      - eval_listops
      - eval_gsm8k
      - toy_depth_task         # paper Tier 2.4, pinned here via requires_resource
    python_bin: /home/alexm/venvs/vllm-turboquant/bin/python3
    # Verified 2026-06-03 against actual running units. GPU 1 now hosts
    # kebab-rtx-vllm-coder-gpu1 (Qwen3-Coder-Next FP8 80B MoE, ~75 GB
    # holdings, system-scope, docker --gpus device=1) AND kebab-rtx-embedding
    # (Qwen3-Embedding-8B, ~10 GB, also system-scope on device=1). The
    # previous declaration named kebab-rtx-vision-cuda.service which does
    # NOT exist as a unit on the host. Any job dispatched here will trigger
    # requires_exclusive eviction of both units.
    conflicts_with:
      - {service: kebab-rtx-vllm-coder-gpu1.service, scope: system}
      - {service: kebab-rtx-embedding.service, scope: system}
    external_lease:
      service: kebab-rtx-vllm-coder-gpu1
      description: "Qwen3-Coder-Next-FP8 vLLM (docker --gpus device=1, ~75 GB) + co-tenant kebab-rtx-embedding ~10 GB"
      held_vram_gb: 85
      state: held
      scope: system
    # Same kebab-rtx6000 FastAPI router as gpu0 (host-level surface, not per-GPU).
    router:
      url: http://kebab-rtx6000.lan:8080
      capabilities: [health, admin_models_load, admin_models_unload, admin_models_status]
    notes: "Has Vault access + GitHub creds -- DO NOT expose to vast.ai/external"

  - id: rtx5090
    host: mini-beast.lan
    ssh_user: alex                  # different uid from the rtx6000 alexm
    repo_root: /home/alex/OpenMythos  # alex's home, not /home/alexm/...
    cuda_device: 0
    class: rtx5090
    vram_gb: 32
    priority_tier: 2                # best-effort, flaky on heavy CUDA work
    # vllm-20b.service holds this GPU continuously serving gpt-oss-20b with
    # an Eagle3 speculator at 131K context, 96 max sequences (~30 GB). The
    # service is a day-to-day inference target outside the eval pipeline;
    # gpufarm does not dispatch eval work here while it is held. Operator
    # flips state to released when the service is intentionally stopped
    # (e.g. during driver upgrades, host reboots, or to free the card for
    # a one-off CUDA job). Phase 2 live-probe (task to be filed) will flip
    # this automatically from the systemctl state.
    external_lease:
      service: vllm-20b
      description: "gpt-oss-20b + Eagle3 speculator on port 8000 (vllm-20b.service)"
      held_vram_gb: 30
      state: held
    recovery_hook: |
      # Consumer card; gpu-reset is "Not Supported". Last resort: host reboot.
      # Only execute on explicit operator confirmation -- this kicks all
      # mini-beast user services (vllm-20b, florence2, whisper-cpp, etc.)
      ssh -q alex@mini-beast.lan "sudo reboot"
    can_run:
      - per_token_halt
      - depth_extrap     # K<=32 only
      - inference_benchmark
      - gen_samples_multidepth
    avoid:
      - depth_extrap_k64  # proven flaky: r2.13 hung 15h at n_loops=32, required reboot
      - sft_lora          # 32 GB tight for 3B + lora + ultrachat seq_len 2048
      - reasoning_eval    # bench long; let Blackwell handle
    # Active conflicts_with services only (gpufarm derives extras from the
    # router at runtime, so don't pre-declare alternatives like
    # vllm-20b-128k/fast/vanilla or sdxl/outetts that aren't currently
    # serving -- if any of those get activated, bump them into the router's
    # SERVICE_UNITS and gpufarm will pick them up on the next refresh tick).
    conflicts_with:
      - {service: vllm-20b.service,    scope: user}
      - {service: florence2.service,   scope: user}
      - {service: whisper-cpp.service, scope: user}
    # mini-beast stdlib http.server router (sibling_repos_survey.md:71-94).
    # Exposes /health, /stats, /metrics, /backends, /v1/models. As of
    # 2026-05-18 also exposes /admin/models/{load,unload,status} backed by
    # systemctl --user against the unit registry in router.py:SERVICE_UNITS
    # -- the load handler waits for the backend's own /health 200 (not just
    # systemd active) so callers get an honest "ready to serve" signal.
    # Accepts gpufarm-style {"model_id": "..."} and legacy {"model": "..."}.
    router:
      url: http://mini-beast.lan:8080
      capabilities: [health, stats, metrics, admin_models_load, admin_models_unload, admin_models_status]
    notes: |
      Consumer card -- nvidia-smi --gpu-reset is "Not Supported". Avoid
      SIGKILL on hung CUDA processes (left GPU in error state 2026-05-11,
      required host reboot to clear).

  - id: mini-beast-8060s
    host: mini-beast.lan
    ssh_user: alex                  # same uid as rtx5090; sibling GPU in same box
    repo_root: /home/alex/OpenMythos
    cuda_device: null               # AMD APU, no CUDA index. Backend selected by job (ROCm or Vulkan).
    class: strix_halo                # AMD Radeon 8060S (Strix Halo gfx1151)
    vram_gb: 128                    # Unified-memory ceiling, NOT what rocm-smi/gpu-metrics-exporter report.
                                    # rocm-smi exposes only the 512 MB dedicated framebuffer carveout
                                    # (`VRAM Total = 536870912` -- intentional, not a bug). The usable
                                    # pool for compute is the GTT/system-RAM share, capped by the
                                    # `amd_iommu=pt` boot setting and effectively bounded by physical
                                    # RAM. 128 GB is the practical ceiling for inference workloads here.
    priority_tier: 3                # below rtx5090; serves the Vulkan/ROCm side of mini-beast
    # Strix Halo runs a bundle of persistent Vulkan/ROCm inference services
    # (qwen3-coder, qwen-vision, embedding, flux, qwen3-tts, colpali,
    # whisper-cpp, plus the on-demand qwen36-35b-a3b cascade leg 2 backend).
    # Together they hold most of the 128 GB unified pool at any moment
    # (rocm-smi --showmemuse typically reports 90-95% allocated). One
    # external_lease can only name a single canonical service so we point
    # at qwen3-coder, which is the dominant day-to-day surface, and document
    # the rest in the conflicts_with block below. The Phase 2 live-probe
    # (PR amittell/gpufarm#25) asks systemctl --user is-active for this
    # service name on every tick. The earlier placeholder name
    # "strixhalo-inference-bundle" was not a real systemd unit so the probe
    # always reported "inactive"; the resolved state stayed HELD because
    # of state: held below, but the probe column was misleading.
    external_lease:
      service: qwen3-coder
      description: "Vulkan/ROCm bundle canonical: qwen3-coder.service (+ qwen-vision, embedding, flux, qwen3-tts, colpali, whisper-cpp; port 8080 router); ~95% GTT held"
      held_vram_gb: 110
      state: held
    recovery_hook: |
      # Same recovery posture as rtx5090: consumer-grade silicon, no reliable
      # in-band reset. amdgpu kernel module is more forgiving than nvidia.ko
      # under SIGKILL but the gfx1151 ROCm stack is young; treat hangs as
      # host-reboot territory until proven otherwise.
      ssh -q alex@mini-beast.lan "sudo reboot"
    can_run: []                     # No jobs in the manifest currently target ROCm/Vulkan.
                                    # Reserved for future llama.cpp-Vulkan benchmarks, Qwen-VL ports, etc.
    avoid:                          # Every standard CUDA job in jobs.yaml -- the toolchain
      - sft_lora                    # mismatch makes them either fail-fast (CUDA-only kernels)
      - train_round                 # or run silently on CPU. Explicit avoid keeps the
      - train_round_joint           # dispatcher from ever surprising a job onto it.
      - toy_depth_task
      - per_token_halt
      - depth_extrap
      - depth_extrap_k64
      - reasoning_eval
      - inference_benchmark
      - act_halt_diagnostic
      - act_halt_histogram
      - gen_samples_multidepth
      - eval_listops
      - eval_gsm8k
    # Active Vulkan/ROCm services that gpufarm should evict before
    # claiming the GPU. The mini-beast router lists them with
    # cuda_device=None so the standard router-conflict-refresh path
    # (which keys by cuda_device) won't auto-populate -- we name them
    # explicitly here.
    conflicts_with:
      - {service: qwen-vision.service,  scope: user}    # Qwen3-VL-32B Vulkan RADV
      - {service: qwen3-coder.service,  scope: user}    # Qwen3-Coder-30B-A3B Vulkan Q6_K
      - {service: flux.service,         scope: user}    # FLUX.1-schnell Vulkan
      - {service: embedding.service,    scope: user}    # Qwen3-Embedding-8B Vulkan
      - {service: qwen3-tts.service,    scope: user}    # Qwen3-TTS ROCm
      - {service: colpali.service,      scope: user}    # ColQwen2 doc retrieval
    # Shares the mini-beast router with rtx5090 (port 8080). The router
    # reports cuda_device=None for AMD-backed services so the standard
    # _refresh_router_conflicts path won't bind them here. health/stats
    # are still useful surfaces for liveness checks. metrics exporter is
    # separate at :9835 (Prometheus, exposes both NVIDIA + AMD).
    router:
      url: http://mini-beast.lan:8080
      capabilities: [health, stats, admin_models_status]
    notes: |
      Strix Halo APU: 128 GB unified memory, gfx1151 ROCm target. Useful
      for Vulkan-backed llama.cpp inference and (eventually) ROCm-built
      PyTorch workloads. Not currently a target for any gpufarm job --
      visibility-only entry until ROCm-compatible job variants are added.
      Prometheus exporter on :9835 reports both `nvidia_0` and `radeon_0`
      labels under standard gpu_* metric names.
