# Job-type manifest. Each entry is a template for one kind of work the farm
# can run. The dispatcher (Layer 2) renders {label}/{round_num}/etc per
# invocation. The gap detector (Layer 1) uses output_pattern to test whether
# a (round, job) pair has landed.
#
# Schema (v0.1):
#   id                    unique
#   script                relative path under repo root
#   resource_class        list of acceptable classes (gb10/blackwell/rtx5090)
#   requires_resource     OPTIONAL: pin to a specific resource id (e.g., cluster-4node)
#   env_required          env var names that the caller must supply
#   env_defaults          env var defaults (callee can override)
#   input_files           templated paths that MUST exist before dispatch
#   output_pattern        templated path produced on success
#   estimated_minutes     informational; sort/scheduling hint
#   timeout_minutes       hard wallclock cap; defaults to 3 * estimated
#   priority              0 (urgent) .. 9 (background); defaults to 5
#   preemptible           bool; can a higher-pri job boot us? defaults false
#   python_bin            interpreter path; defaults to system python3
#   max_retries           bounded retry on transient failure; default 2

jobs:
  # -------- Cluster training (FSDP, 4-rank) --------
  - id: train_round
    script: training/3b_varT_act_v3.py
    parallel: 4_rank_fsdp
    resource_class: [gb10]
    requires_resource: cluster-4node
    env_required: [CKPT_DIR, BOOTSTRAP_CKPT]
    env_optional: [T_FIXED, T_MAX, T_MIN]
    input_files:
      - "{BOOTSTRAP_CKPT}"
    output_pattern: "{CKPT_DIR}/step_{step_final}_full.pt"
    estimated_minutes: 1500
    timeout_minutes: 2880           # 48h; covers T_FIXED=16 worst case
    priority: 0                     # highest -- training is precious
    preemptible: false
    max_retries: 1
    requires_exclusive: true        # 4-rank cluster training needs the gb10s to itself

  # Joint PonderNet-KL training (rounds 2.3, 2.6, 2.10, 2.13 used this script).
  # Same cluster + same envelope as train_round; only script differs.
  - id: train_round_joint
    script: training/3b_varT_pondernet_joint.py
    parallel: 4_rank_fsdp
    resource_class: [gb10]
    requires_resource: cluster-4node
    env_required: [CKPT_DIR, BOOTSTRAP_CKPT]
    env_optional: [TARGET_TOKENS, REINIT_HEAD, LAMBDA_P]
    input_files:
      - "{BOOTSTRAP_CKPT}"
    output_pattern: "{CKPT_DIR}/step_{step_final}_full.pt"
    estimated_minutes: 1500          # 50M tokens; scales linearly past that
    timeout_minutes: 10080           # 7 days; covers 300M-token scaled runs
    priority: 0
    preemptible: false
    max_retries: 1
    requires_exclusive: true

  # -------- Cluster consolidation --------
  # The 4 rank shards live on each cluster member's own local disk (FSDP
  # writes per-rank), not all on rank 0's host. The previous spec listed
  # rank0..rank3 as four hard-coded paths and the input_files precondition
  # checked them all on rank 0 -- which failed for ranks 1-3 because the
  # files only exist on the matching gx10. gpufarm bug-5 (PR #16 b1a8175,
  # squash 019da94, deployed 2026-05-31) adds the input_cluster_resource
  # field: when set and an input path templates {rank}, the dispatcher
  # iterates each member of that cluster and probes the path on the
  # matching member's host. cluster-4node here matches the run's
  # requires_resource so each rank-N shard is checked on rank-N's host.
  - id: consolidate
    script: training/consolidate_ckpt.py
    parallel: 4_rank_fsdp
    resource_class: [gb10]
    requires_resource: cluster-4node
    input_cluster_resource: cluster-4node
    env_required: [SRC_PATTERN, DST_PATH]
    input_files:
      - "{SRC_PATTERN}_rank{rank}.pt"
    output_pattern: "{DST_PATH}"
    estimated_minutes: 20
    timeout_minutes: 60
    priority: 1
    preemptible: false
    max_retries: 2
    requires_exclusive: true        # cluster consolidation needs all 4 ranks

  # -------- Single-host consolidation (fallback when cluster is busy) --------
  # Drives the same FSDP-shards-to-full-state-dict collapse as ``consolidate``
  # above but on a SINGLE multi-GPU host instead of the 4-node cluster. Use
  # when the cluster ``consolidate`` job can't run -- typically because the
  # gpufarm cluster supervisor is holding cluster-4node for an in-flight
  # training run on a different round (the situation that drove gpufarm
  # task #116: r2.18's consolidate was blocked by r2.20's supervisor).
  #
  # Wraps ``training/consolidate_ckpt_single_host.py`` under
  # ``torch.distributed.run --standalone --nnodes=1 --nproc_per_node=4``
  # via gpufarm's ``torchrun_nproc_per_node`` field (added in PR #18 there).
  # The 4 ranks colocate on the host's GPUs via the modulo mapping
  # ``LOCAL_RANK % torch.cuda.device_count()`` inside the script -- so on
  # the 2-GPU kebab-rtx6000 box ranks 0+2 share cuda:0 and ranks 1+3 share
  # cuda:1 (each shard ~11 GB; 22 GB per card; fits in 96 GB headroom).
  #
  # input_files are 4 explicit per-rank paths (NOT templated with {rank})
  # because all 4 shards must live on the SAME host before this job can
  # run -- the operator pre-rsyncs them off the cluster. That's the
  # opposite of the cluster ``consolidate`` job above, which uses
  # ``input_cluster_resource`` to probe each shard on its matching rank.
  #
  # Resource class is ``blackwell`` (96 GB cards). 2-GPU host preferred
  # over 1-GPU because 4 shards on one 96 GB card peaks at ~95 GB during
  # FSDP wrap (tight). ``requires_exclusive: true`` evicts vllm /
  # embedding / vision services so the consolidator has full VRAM access.
  - id: consolidate_single_host
    script: training/consolidate_ckpt_single_host.py
    resource_class: [blackwell]
    # Pin to the whole-host view of kebab-rtx6000 so all 4 torchrun ranks
    # see BOTH GPUs (the per-GPU views ``blackwell-gpu0`` /
    # ``blackwell-gpu1`` set ``cuda_device`` -> ``CUDA_VISIBLE_DEVICES``
    # gets injected -> only 1 GPU visible -> ranks pile on cuda:0 ->
    # OOM). The host view also stops vision-cuda on gpu1 in addition to
    # vllm/embedding on gpu0 so torchrun has the full 2x96=192 GB of
    # VRAM available. (Copilot OpenMythos PR#2 review.)
    requires_resource: blackwell-host
    torchrun_nproc_per_node: 4
    env_required: [SRC_PATTERN, DST_PATH]
    input_files:
      - "{SRC_PATTERN}_rank0.pt"
      - "{SRC_PATTERN}_rank1.pt"
      - "{SRC_PATTERN}_rank2.pt"
      - "{SRC_PATTERN}_rank3.pt"
    output_pattern: "{DST_PATH}"
    estimated_minutes: 30
    timeout_minutes: 90
    priority: 1
    preemptible: false
    max_retries: 1
    requires_exclusive: true        # 4 ranks on one host; need full VRAM + no other gpufarm work

  # -------- Per-ckpt evals --------
  - id: inference_benchmark
    script: training/inference_throughput_benchmark.py
    resource_class: [blackwell]
    env_required: [CKPT, OUT]
    env_defaults:
      T_VALUES: "1,2,4,8,16"
      PROMPT_LEN: "512"
      GEN_LEN: "128"
      DEVICE: "cuda:0"
    input_files: ["{CKPT}"]
    output_pattern: docs/inference_benchmark_r{round_num}.json
    estimated_minutes: 5
    timeout_minutes: 30
    priority: 5
    preemptible: true
    python_bin: /home/alexm/venvs/vllm-turboquant/bin/python3

  - id: per_token_halt
    script: training/per_token_halt_analysis.py
    resource_class: [blackwell, rtx5090]
    env_required: [CKPT, OUT]
    input_files: ["{CKPT}"]
    output_pattern: docs/per_token_halt_round{round_num}.json
    estimated_minutes: 8
    timeout_minutes: 30
    priority: 5
    preemptible: true

  - id: depth_extrap
    script: training/depth_extrap.py
    resource_class: [blackwell, rtx5090]
    env_required: [CKPT, OUT]
    env_defaults:
      DEPTHS: "4,8,16,32"
    input_files: ["{CKPT}"]
    output_pattern: docs/depth_extrap_round{round_num}.json
    estimated_minutes: 15
    timeout_minutes: 60
    priority: 5
    preemptible: true

  - id: depth_extrap_k64
    script: training/depth_extrap.py
    resource_class: [blackwell]
    env_required: [CKPT, OUT]
    env_defaults:
      DEPTHS: "4,8,16,32,64"
    input_files: ["{CKPT}"]
    output_pattern: docs/depth_extrap_round{round_num}_k64.json
    estimated_minutes: 8
    timeout_minutes: 30           # tight bound; 5090 hung 15h at K=32
    priority: 5
    preemptible: true

  - id: reasoning_eval
    script: training/reasoning_eval.py
    resource_class: [blackwell]
    env_required: [CKPT, OUT]
    input_files: ["{CKPT}"]
    output_pattern: docs/reasoning_eval_round{round_num}.json
    estimated_minutes: 30
    timeout_minutes: 120
    priority: 5
    preemptible: true

  - id: act_halt_diagnostic
    script: training/act_halt_diagnostic.py
    resource_class: [gb10, blackwell]
    env_required: [CKPT, OUT]
    input_files: ["{CKPT}"]
    output_pattern: docs/act_halt_diagnostic_round{round_num}.json
    estimated_minutes: 10
    timeout_minutes: 30
    priority: 5
    preemptible: true

  - id: act_halt_histogram
    script: training/act_halt_histogram.py
    resource_class: [gb10, blackwell]
    env_required: [CKPT, OUT]
    input_files: ["{CKPT}"]
    output_pattern: docs/act_halt_histogram_round{round_num}.json
    estimated_minutes: 5
    timeout_minutes: 30
    priority: 5
    preemptible: true

  - id: sft_lora
    script: training/sft_lora_minibeast.py
    resource_class: [blackwell]
    env_required: [CKPT, OUT_DIR]
    env_defaults:
      DATASET: HuggingFaceH4/ultrachat_200k
      SPLIT: train_sft
      MAX_SAMPLES: "50000"
      SEQ_LEN: "2048"
      LORA_RANK: "32"
      LORA_ALPHA: "64"
      LR: "2e-4"
      EPOCHS: "1"
      MICRO_BATCH: "2"
      GRAD_ACCUM: "4"
      SAVE_EVERY: "500"
      SAVE_MERGED: "1"
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    input_files: ["{CKPT}"]
    output_pattern: docs/sft_lora_r{round_num}_training_curve.json
    estimated_minutes: 120
    # Bumped 240 -> 600 on 2026-06-04. Run #210 (r215) ran at 5.9k tok/s
    # while #211 (r218) ran at 12.8k tok/s -- the difference was that
    # cascade leg 1 vLLM on GPU 1 was sharing the host's PCIe bandwidth
    # for #210, roughly halving sft_lora throughput. The 240 min budget
    # was too tight to absorb that. 600 gives headroom for similar
    # contention scenarios. Pair with the script's incremental
    # training_curve.json writes (2026-06-04 patch) so even a job that
    # eats the new ceiling leaves a usable partial curve.
    timeout_minutes: 600
    priority: 7                    # lower than evals -- big time investment
    preemptible: false             # losing 2h of SFT progress is expensive
    python_bin: /home/alexm/venvs/vllm-turboquant/bin/python3
    requires_exclusive: true       # 2h SFT on a tight 32GB box -- needs the GPU to itself

  - id: gen_samples_multidepth
    script: training/gen_samples_multidepth.py
    resource_class: [blackwell, gb10, rtx5090]
    env_required: [CKPT, OUT]
    input_files: ["{CKPT}"]
    output_pattern: docs/gen_samples_round{round_num}_multidepth.txt
    estimated_minutes: 5
    timeout_minutes: 30
    priority: 6
    preemptible: true

  - id: eval_listops
    script: training/eval_listops.py
    resource_class: [blackwell]
    env_required: [CKPT, OUT]
    input_files: ["{CKPT}"]
    output_pattern: docs/eval_listops_round{round_num}.json
    estimated_minutes: 20
    timeout_minutes: 60
    priority: 5
    preemptible: true

  - id: eval_gsm8k
    script: training/eval_gsm8k_generation.py
    resource_class: [blackwell]
    env_required: [CKPT, OUT]
    input_files: ["{CKPT}"]
    output_pattern: docs/eval_gsm8k_generation_round{round_num}.json
    estimated_minutes: 30
    timeout_minutes: 90
    priority: 5
    preemptible: true

  # -------- Toy depth-required task (paper Tier 2.4) --------
  # Trains a ~50M-param recurrent-depth toy model on nested-XOR expressions
  # of variable depth d in {1..8}, sweeping LAMBDA_P to discriminate the
  # architectural-floor / depth-adaptive / prior-only hypotheses.
  # Pinned to blackwell-gpu1 because blackwell-gpu0 holds the coder model.
  - id: toy_depth_task
    script: training/toy_depth_task.py
    resource_class: [blackwell]
    requires_resource: blackwell-gpu1
    env_required: [LAMBDA_P, OUT]
    env_defaults:
      LAMBDA_KL: "1.0"
      T_MAX: "16"
      TARGET_TOKENS: "5000000"
      D_MAX: "8"
      D_MIN: "1"
      LR: "3e-4"
      D_MODEL: "384"
      N_HEADS: "6"
      D_FF: "1536"
      BATCH: "32"
      SEQ_LEN: "512"
      LOG_EVERY: "50"
    output_pattern: "{OUT}/toy_results_lp{LAMBDA_P}.json"
    estimated_minutes: 240
    timeout_minutes: 480
    priority: 5
    preemptible: false             # 4h training, no resume support
    python_bin: /home/alexm/venvs/vllm-turboquant/bin/python3
    max_retries: 1
    requires_exclusive: true       # one toy run at a time on gpu1
